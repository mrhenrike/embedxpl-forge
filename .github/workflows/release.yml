# Author: Andre Henrique (@mrhenrike) | Uniao Geek - https://github.com/Uniao-Geek
#
# Release workflow for EmbedXPL-Forge.
# Runs quality gates (pytest, docgen stats, theoretical-only audit)
# then builds and publishes to PyPI via OIDC Trusted Publisher.
#
# Trigger: push of v* tags only.
# Security: OIDC publishing, no API tokens stored in workflow.

name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  gate-check:
    name: "Quality gate"
    if: github.repository == 'mrhenrike/EmbedXPL-Forge'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run pytest
        run: python -m pytest tests/ -v --tb=short -q

      - name: Run docgen stats
        run: python -m embedxpl.tools.hw_requirements_audit --json-only

      - name: Audit for theoretical-only modules
        run: |
          COUNT=$(grep -rl "theoretical" embedxpl/modules/ | wc -l)
          echo "Theoretical-only references found: $COUNT"
          if [ "$COUNT" -gt 0 ]; then
            echo "::warning::$COUNT file(s) contain 'theoretical' references"
            grep -rl "theoretical" embedxpl/modules/ || true
          fi

  publish:
    name: "Build and publish"
    needs: gate-check
    if: github.repository == 'mrhenrike/EmbedXPL-Forge'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/embedxpl/

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: python -m pip install --upgrade pip build twine

      - name: Build wheel and sdist
        run: python -m build

      - name: Verify with twine check
        run: python -m twine check dist/*

      - name: Publish to PyPI via OIDC
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          print-hash: true
          verbose: true
          skip_existing: true
