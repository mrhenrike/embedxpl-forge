# Author: André Henrique (@mrhenrike) | União Geek — https://github.com/Uniao-Geek
#
# Publish routerxpl to PyPI on every version tag (v*).
# Uses PyPI Trusted Publishing (OIDC) — no API tokens required.
#
# Setup once on PyPI: https://pypi.org/manage/account/publishing/
#   PyPI project name : routerxpl
#   GitHub owner      : mrhenrike
#   GitHub repo       : RouterXPL-Forge
#   Workflow file     : publish-pypi.yml
#   Environment       : pypi

name: publish-pypi

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g. v0.6.0)"
        required: false
        default: ""

permissions:
  contents: read
  id-token: write   # Required for OIDC Trusted Publishing

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build sdist and wheel
        run: python -m build

      - name: Verify distribution
        run: |
          python -m twine check dist/*
          echo "--- Distribution contents ---"
          ls -lh dist/

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/routerxpl/

    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI (Trusted Publishing / OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          print-hash: true
          verbose: true

  publish-testpypi:
    name: Publish to TestPyPI (dry-run)
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    environment:
      name: testpypi
      url: https://test.pypi.org/project/routerxpl/

    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI (Trusted Publishing / OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          print-hash: true
          verbose: true
